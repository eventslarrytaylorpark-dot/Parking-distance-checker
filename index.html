  input[type=text]::placeholder { color: var(--text3); }

  textarea:focus { border-color: var(--blue); background: var(--surface); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; border-radius: var(--rs); cursor: pointer; transition: all .12s; border: 1px solid transparent; }
  .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
  .btn-primary:hover { background: #333; }
  .btn-primary:active { transform: scale(.98); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border-s); }
  .btn-secondary:hover { background: var(--surface2); }
  .btn-secondary:active { transform: scale(.98); }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1rem; }
  .tabs { display: flex; gap: 2px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--rs); padding: 3px; width: fit-content; margin-bottom: 1rem; }
  .tab { padding: 6px 16px; font-size: 13px; font-weight: 500; border-radius: 5px; cursor: pointer; color: var(--text2); border: none; background: transparent; font-family: 'DM Sans', sans-serif; transition: all .12s; }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  .drop-zone:hover, .drop-zone.over { border-color: var(--blue); background: var(--blue-bg); }
  .drop-zone input[type=file] { display: none; }

  .dzt { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .dzs { font-size: 13px; color: var(--text2); }
